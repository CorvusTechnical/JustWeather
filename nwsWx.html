<script>

	var forecast;
	var alerts;
	var wx_area;
	var fc_area;

	var alert_url;
	
	function onloadRoutines(){
		getWx();
		nwsAlert();
	}

	function nwsAlert(){
		alerts=null;
		if(alert_url == null)
			{alert_url = 'https://api.weather.gov/alerts/active?zone=MNZ037'}
		else{
			alert_url = 'https://api.weather.gov/alerts/active?zone=' + fc_zone;
		}
		fetch(alert_url)
                .then(res => res.json())
                .then(out => {alerts = out.features})
                .then(signalAlert);
                //.catch(err => alert(err));
	}

	function signalAlert(){
		var alertIcon = document.getElementById("alert");
		if(alerts[0]){
			alertIcon.style.display = 'inline-block';
		}else{
			alertIcon.style.display = 'none';
		}
	}

	function showAlert(){
		if(alerts){
			var alertText = alerts[0].properties.headline + "\n\n" + alerts[0].properties.description;
			showModal(alertText);
		}
	}

	function showRadar(){
		showModal('<center><img src="https://radar.weather.gov/ridge/standard/KDLH_loop.gif"></center>');
	}


	function showModal(content){
		// Get the modal
		var modal = document.getElementById("modal");
		var modalContent = document.getElementById("modal-content");
		modalContent.innerHTML = content;
		 modal.style.display = "block";
	}

	window.onclick = function(event) {
		if (event.target == modal) {
		    modal.style.display = "none";
		}
	} 

	function showForecast(period){
		showModal(forecast.periods[period].detailedForecast);
	}

	function getWx(fc_url = null){
		if (fc_area == null){
			fc_url = 'https://api.weather.gov/gridpoints/DLH/86,67/forecast'
		}else{fc_url = fc_area.forecast};
		fetch(fc_url)
		.then(res => res.json())
		.then(out => {forecast = out.properties})
		.then(getHiLo)
		.then(getForecast);
		//.catch(err => alert(err));
	}
	
	function getWxLocation(){
		const url = 'https://api.weather.gov/points/'+wx_area.lat+','+wx_area.lon;
		console.log('getting forecast url: ' + url);
		fetch(url)
		.then(res => res.json())
		//.then(console.log(res))
		.then(out => {fc_area = out.properties})
		//.then(out => {fc_zone = out.properties.forecast_zone})
		.then(getWx)
		.then(getZone)
		.then(nwsAlert);
	}
	
	function getZone(){
		const fcz_text = fc_area.forecastZone;
		const fc_zone_url = new URL(fcz_text);
		fc_zone = fc_zone_url.pathname.split('/').at(-1);
		console.log(fc_zone);
		//getWx(fc_area);
	}

	function getHiLo(){
		var nwsHiLo = forecast.periods.slice(0,2).map(a => a.temperature).sort(function(a, b){return (a - b);});
		document.getElementById('nwsHi').innerHTML = nwsHiLo[1];
		document.getElementById('nwsLo').innerHTML = nwsHiLo[0];
		var nwsFc = document.getElementById('nwsFc');
		if(nwsFc.offsetWidth < nwsFc.scrollWidth){
			nwsFc.innerHTML = '<marquee>'+forecast.periods[0].shortForecast+'</marquee>';
		}else{
			nwsFc.innerHTML = forecast.periods[0].shortForecast;
		}
	}

	function getForecast(){
		// Example usage:

		if(forecast){
			var nwsFcst = forecast.periods;
			let d=1;
			for (let i = 0; d<6; i++) {
				if(forecast.periods[i].isDaytime && forecast.periods[i].name != 'Today' && forecast.periods[i].name != 'This Afternoon'){
					//document.getElementById('day'+d).innerHTML = 
					document.getElementById('daily_fc').innerHTML =
					'<td id="day2" class="fcst"><img src="'+forecast.periods[i].icon+'" width="100vw" onClick="showForecast('+i+')"/><br>'
					+forecast.periods[i].name.slice(0,3)
					+'&nbsp;<font color="red">' + forecast.periods[i].temperature + '</font></td>';
					/*
					'<img src="'+forecast.periods[i].icon+'" width="100vw" onClick="showForecast('+i+')"/><br>'
					+forecast.periods[i].name.slice(0,3)
					+'&nbsp;<font color="red">' + forecast.periods[i].temperature + '</font>';*/
					d++;
				}
		}
		}
	} 
	
	function localize(){
		const query = encodeURIComponent(document.getElementById('searchBox').value);
		const url = 'https://nominatim.openstreetmap.org/search?q='+query+'&format=json&limit=1&countrycodes=us';
		
		//get location data from Nominatim
		var XHR = new XMLHttpRequest();
		XHR.onreadystatechange = function () {
		if (XHR.readyState == 4 && XHR.status == 200) {
			console.log(XHR.responseText);
			wx_area = JSON.parse(XHR.responseText)[0];
			console.log(wx_area.display_name);
			setLocationName(wx_area);
			getWxLocation();
			return wx_area;
			
		}
		};
		XHR.open("GET", url);
		XHR.send();
	}
	
	function setLocationName(wx_area){
		document.getElementById('loc_name').innerHTML = wx_area.display_name;
	}

</script>
